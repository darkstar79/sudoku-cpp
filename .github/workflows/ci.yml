name: CI

on:
  push:
    branches: [ main, develop, 'feature/**', 'ci/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  format-check:
    name: Code Formatting
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check code formatting
        run: |
          echo "Checking code formatting with clang-format..."
          ./scripts/format.sh check
          if [ $? -ne 0 ]; then
            echo "❌ Code formatting check failed!"
            echo "Run './scripts/format.sh' to fix formatting issues"
            exit 1
          fi
          echo "✅ Code formatting check passed"

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    needs: format-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-tidy \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libudev-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libpulse-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-xcb-dev \
            libfontenc-dev \
            libice-dev \
            libsm-dev \
            libxaw7-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxkbfile-dev \
            libxmu-dev \
            libxmuu-dev \
            libxpm-dev \
            libxres-dev \
            libxss-dev \
            libxt-dev \
            libxtst-dev \
            libxv-dev \
            libxxf86vm-dev \
            libxcb-glx0-dev \
            libxcb-render0-dev \
            libxcb-render-util0-dev \
            libxcb-xkb-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-dri3-dev \
            libxcb-cursor-dev \
            libxcb-dri2-0-dev \
            libxcb-present-dev \
            libxcb-composite0-dev \
            libxcb-ewmh-dev \
            libxcb-res0-dev \
            libxcb-util-dev \
            libxcb-util0-dev

      - name: Install Conan
        run: |
          pip3 install conan
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-relwithdebinfo-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-relwithdebinfo-

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=RelWithDebInfo

      - name: Run static analysis
        run: |
          echo "Running static analysis with clang-tidy..."
          cmake --preset conan-relwithdebinfo
          ./scripts/tidy.sh check
          if [ $? -ne 0 ]; then
            echo "❌ Static analysis found issues!"
            exit 1
          fi
          echo "✅ Static analysis passed"

  test-and-coverage:
    name: Test & Coverage
    runs-on: ubuntu-24.04
    needs: static-analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            ccache \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libudev-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libpulse-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-xcb-dev \
            libfontenc-dev \
            libice-dev \
            libsm-dev \
            libxaw7-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxkbfile-dev \
            libxmu-dev \
            libxmuu-dev \
            libxpm-dev \
            libxres-dev \
            libxss-dev \
            libxt-dev \
            libxtst-dev \
            libxv-dev \
            libxxf86vm-dev \
            libxcb-glx0-dev \
            libxcb-render0-dev \
            libxcb-render-util0-dev \
            libxcb-xkb-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-dri3-dev \
            libxcb-cursor-dev \
            libxcb-dri2-0-dev \
            libxcb-present-dev \
            libxcb-composite0-dev \
            libxcb-ewmh-dev \
            libxcb-res0-dev \
            libxcb-util-dev \
            libxcb-util0-dev

      - name: Install Conan and gcovr
        run: |
          pip3 install conan gcovr
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-relwithdebinfo-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-relwithdebinfo-

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=RelWithDebInfo

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-relwithdebinfo-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-relwithdebinfo-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Build, test, and generate coverage report
        run: |
          ./scripts/coverage.sh xml
          echo "✅ Build, tests, and coverage report complete"

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Enforce coverage threshold
        run: |
          echo "Checking coverage thresholds..."
          gcovr --config .gcovr.cfg
          echo "✅ Coverage thresholds met"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage_report.html
          retention-days: 30
