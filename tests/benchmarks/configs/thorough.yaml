# Thorough benchmark configuration
# Deep statistical analysis (for major optimization validation)
#
# Usage:
#   ./bin/benchmarks/puzzle_generation_benchmark --config tests/benchmarks/configs/thorough.yaml

benchmarks:
  - name: "Thorough Hard"
    difficulty: Hard
    iterations: 100
    max_attempts: 200
    seeds: [12345, 54321, 99999, 11111, 22222]
    verbose: false

  - name: "Thorough Expert"
    difficulty: Expert
    iterations: 50
    max_attempts: 1000
    seeds: [12345, 54321, 99999, 11111, 22222]
    verbose: true
