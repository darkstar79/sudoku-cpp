# gcovr configuration file for sudoku-cpp project
# Used by both CI (.github/workflows/ci.yml) and local (scripts/coverage.sh)

# Root directory for coverage analysis
root = .

# Restrict gcda file search to the instrumented build only.
# Without this, gcovr merges Debug + RelWithDebInfo gcda files
# when both exist locally, producing inconsistent results vs CI
# (which only has the RelWithDebInfo build).
search-path = build/RelWithDebInfo

# Include only source files
filter = src/.*

# Exclude patterns (regular expressions)
exclude = tests/.*
exclude = build/.*
exclude = \..*conan.*
exclude = /usr/.*
exclude = .*catch2.*
exclude = .*yaml.*
exclude = .*spdlog.*
exclude = .*fmt.*
# Exclude view layer (requires Qt6 rendering context, not unit-testable)
exclude = src/view/.*

# Output settings
print-summary = yes

# Workaround for gcov bug with suspicious hit counts (GCC bug #68080)
gcov-ignore-parse-errors = suspicious_hits.warn_once_per_file

# Minimum coverage thresholds (fail if below these percentages)
fail-under-line = 80
fail-under-function = 70  # ViewModel layer (game_view_model, training_view_model) requires Qt6 context; realistic ceiling ~73%
fail-under-branch = 55  # Local (RelWithDebInfo only) measures ~60%; CI (Ubuntu 24.04 GCC) measures ~59.5%; 55% gives headroom
